services:
  db:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: paperclip
      POSTGRES_DB: paperclip
      POSTGRES_HOST_AUTH_METHOD: trust
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U paperclip -d paperclip"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data

  init:
    image: ghcr.io/paperclipai/paperclip:latest
    restart: "no"
    environment:
      DATABASE_URL: postgres://paperclip@db:5432/paperclip
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_ALLOWED_HOSTNAMES:-localhost}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET:-change-me-please}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-change-me-please-32-chars-min}"
      GATEWAY_JS_URL: "${GATEWAY_JS_URL:-https://raw.githubusercontent.com/mjraraujo/paperclip-proxy/main/proxy/bin/gateway.js}"
    entrypoint: ["sh", "-c"]
    command:
      - |
        set -e
        echo "[init] === Paperclip init starting ==="
        if [ ! -f /paperclip/instances/default/config.json ]; then
          echo "[init] Running paperclip onboard --yes"
          cd /app && pnpm paperclipai onboard --yes
        else
          echo "[init] Config already exists"
        fi
        echo "[init] Generating bootstrap-ceo invite URL"
        cd /app && pnpm paperclipai auth bootstrap-ceo --force --base-url "$$PAPERCLIP_PUBLIC_URL" || echo "[init] bootstrap-ceo skipped (admin may already exist)"
        echo "[init] Downloading gateway.js to shared volume"
        node -e "const fs=require('fs');const https=require('https');const http=require('http');function f(u,d){d=d||0;if(d>5){console.error('redirects');process.exit(1);}var m=u.startsWith('https')?https:http;m.get(u,function(r){if(r.statusCode>=300&&r.statusCode<400&&r.headers.location){return f(r.headers.location,d+1);}if(r.statusCode!==200){console.error('status',r.statusCode);process.exit(1);}var o=fs.createWriteStream('/gateway/gateway.js');r.pipe(o);o.on('finish',function(){o.close(function(){console.log('gateway.js ok');process.exit(0);});});}).on('error',function(e){console.error(e);process.exit(1);});}f(process.env.GATEWAY_JS_URL);"
        echo "[init] === Paperclip init complete ==="
    volumes:
      - paperclip-data:/paperclip
      - gateway-bin:/gateway
    depends_on:
      db:
        condition: service_healthy

  server:
    image: ghcr.io/paperclipai/paperclip:latest
    restart: unless-stopped
    ports:
      - "3100:3100"
    environment:
      DATABASE_URL: postgres://paperclip@db:5432/paperclip
      PORT: "3100"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "private"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:-http://localhost:3100}"
      PAPERCLIP_ALLOWED_HOSTNAMES: "${PAPERCLIP_ALLOWED_HOSTNAMES:-localhost}"
      PAPERCLIP_AGENT_JWT_SECRET: "${PAPERCLIP_AGENT_JWT_SECRET:-change-me-please}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:-change-me-please-32-chars-min}"
    volumes:
      - paperclip-data:/paperclip
      - codex-gateway-data:/paperclip/.codex-gateway
    depends_on:
      db:
        condition: service_healthy
      init:
        condition: service_completed_successfully

  proxy:
    image: node:lts-trixie-slim
    restart: unless-stopped
    working_dir: /gateway
    environment:
      HOME: /data
      PROXY_BIND: 0.0.0.0
    command: ["node", "/gateway/gateway.js", "--serve"]
    volumes:
      - gateway-bin:/gateway:ro
      - codex-gateway-data:/data/.codex-gateway
    ports:
      - "18923:18923"
    depends_on:
      init:
        condition: service_completed_successfully
      server:
        condition: service_started

volumes:
  pgdata:
  paperclip-data:
  gateway-bin:
  codex-gateway-data:
